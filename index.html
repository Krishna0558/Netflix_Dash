<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Netflix Dashboard Entry</title>

  <style>
    body {
      margin: 0;
      background-color: black;
      overflow: hidden;
      font-family: Arial, sans-serif;
    }

    video {
      width: 100vw;
      height: 100vh;
      object-fit: cover;
    }

    /* Play button */
    #playBtn {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background-color: #E50914;
      color: white;
      border: none;
      padding: 18px 40px;
      font-size: 22px;
      cursor: pointer;
      border-radius: 4px;
    }

    /* Enter button */
    #enterBtn {
      position: absolute;
      bottom: 60px;
      left: 50%;
      transform: translateX(-50%);
      background-color: #E50914;
      color: white;
      border: none;
      padding: 15px 35px;
      font-size: 20px;
      cursor: pointer;
      border-radius: 4px;
      display: none;
    }
  </style>
</head>

<body>

<!-- Video -->
<video id="introVideo">
  <source src="Netflix New Logo Animation 2019.mp4" type="video/mp4">
</video>

<!-- Play Button -->
<button id="playBtn" onclick="startVideo()">▶ Start Experience</button>

<!-- Enter Button -->
<button id="enterBtn" onclick="goToDashboard()">Continue to Dashboard</button>

<script>
  const video = document.getElementById("introVideo");
  const playBtn = document.getElementById("playBtn");
  const enterBtn = document.getElementById("enterBtn");

  function startVideo() {
    playBtn.style.display = "none"; // hide play button
    video.play();

    // when video ends, show Enter button
    video.onended = function() {
      enterBtn.style.display = "block";
    };
  }

  function goToDashboard() {
    window.location.href = "https://datastudio.google.com/s/s8t91bV7YCE";
  }
</script>

</body>
</html>
