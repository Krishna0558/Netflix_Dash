<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Netflix Dashboard Entry</title>

  <style>
    body {
      margin: 0;
      background-color: black;
      overflow: hidden;
      font-family: Arial, sans-serif;
    }

    video {
      width: 100vw;
      height: 100vh;
      object-fit: cover;
    }

    #playBtn, #enterBtn {
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      background-color: #E50914;
      color: white;
      border: none;
      padding: 16px 35px;
      font-size: 20px;
      cursor: pointer;
      border-radius: 4px;
    }

    #playBtn {
      top: 50%;
      transform: translate(-50%, -50%);
    }

    #enterBtn {
      bottom: 60px;
      display: none;
    }
  </style>
</head>

<body>

<video id="introVideo">
  <source src="tudum.mp4" type="video/mp4">
</video>

<button id="playBtn" onclick="startVideo()">Start Experience</button>

<button id="enterBtn" onclick="goToDashboard()">Explore Insights</button>

<script>
  const video = document.getElementById("introVideo");
  const playBtn = document.getElementById("playBtn");
  const enterBtn = document.getElementById("enterBtn");

  function startVideo() {
    playBtn.style.display = "none";
    video.play();

    video.onended = function() {
      enterBtn.style.display = "block";
    };
  }

  function goToDashboard() {
    window.location.href = "https://datastudio.google.com/s/l69_3Bs0k1w";
  }
</script>

</body>
</html>
